name: flutter_ulink_sdk
description: "Flutter SDK for creating and handling dynamic links, similar to Branch.io"
version: 0.4.0
homepage: https://github.com/mohn93/flutter_ulink_sdk

environment:
  # Built-in Kotlin auto-apply (see android/build.gradle) requires Flutter >= 3.44,
  # which ships Dart 3.12. Do not lower these without re-adding a KGP apply.
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0


flutter:
  plugin:
    platforms:
      android:
        package: com.example.flutter_ulink_sdk
        pluginClass: FlutterUlinkSdkPlugin
      ios:
        pluginClass: FlutterUlinkSdkPlugin
